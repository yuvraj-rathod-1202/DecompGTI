# DecompGTI Inference Config — Qwen2.5-7B (LoRA)
# These are the FIXED, OPTIMAL parameters. No user should change these.

model:
  name: "DecompGTI-7B"
  base: "Qwen/Qwen2.5-7B"
  adapter: "GraphInstruct/LLaMAFactory/saves/Qwen2.5-7B/lora/train_3_epochs_v3"
  device_map: "auto"
  torch_dtype: "auto"
  trust_remote_code: true

inference:
  max_new_tokens: 16384
  temperature: 0.1
  top_p: 0.7
  do_sample: true
  repetition_penalty: 1.1

system_prompt: |
  You are a graph reasoning agent. Given a graph description and a question, perform these three steps:
  1. Extract the graph structure as an adjacency list.
  2. Identify the correct graph algorithm tool to use.
  3. Extract the parameters required by that tool.
  Output your answer as a single valid JSON object.
